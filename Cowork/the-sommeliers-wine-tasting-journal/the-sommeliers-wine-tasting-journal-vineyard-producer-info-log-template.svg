<svg xmlns="http://www.w3.org/2000/svg" width="360" height="576" viewBox="0 0 360 576">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&amp;display=swap');
    </style>
  </defs>

  <!-- Page background -->
  <rect width="360" height="576" fill="#FFFFFF"/>

  <!-- Header bar -->
  <rect x="27" y="54" width="306" height="22" fill="#000000"/>
  <text x="180" y="69" font-family="Merriweather,sans-serif" font-size="11" font-weight="700" fill="#FFFFFF" text-anchor="middle">VINEYARD &amp; PRODUCER INFO LOG</text>

  <!-- WINERY / PRODUCER NAME -->
  <text x="27" y="94" font-family="Merriweather,sans-serif" font-size="7" font-weight="700" fill="#000000">WINERY / PRODUCER NAME</text>
  <rect x="27" y="97" width="306" height="16" fill="#FFFFFF" stroke="#000000" stroke-width="0.75"/>

  <!-- REGION / APPELLATION -->
  <text x="27" y="122" font-family="Merriweather,sans-serif" font-size="7" font-weight="700" fill="#000000">REGION / APPELLATION</text>
  <rect x="27" y="125" width="180" height="16" fill="#FFFFFF" stroke="#000000" stroke-width="0.75"/>

  <!-- COUNTRY -->
  <text x="214" y="122" font-family="Merriweather,sans-serif" font-size="7" font-weight="700" fill="#000000">COUNTRY</text>
  <rect x="214" y="125" width="119" height="16" fill="#FFFFFF" stroke="#000000" stroke-width="0.75"/>

  <!-- VISIT DATE -->
  <text x="27" y="150" font-family="Merriweather,sans-serif" font-size="7" font-weight="700" fill="#000000">VISIT DATE</text>
  <rect x="27" y="153" width="120" height="16" fill="#FFFFFF" stroke="#000000" stroke-width="0.75"/>

  <!-- VISIT TYPE -->
  <text x="154" y="150" font-family="Merriweather,sans-serif" font-size="7" font-weight="700" fill="#000000">VISIT TYPE</text>
  <rect x="154" y="153" width="179" height="16" fill="#FFFFFF" stroke="#000000" stroke-width="0.75"/>

  <!-- Section divider label -->
  <rect x="27" y="177" width="306" height="14" fill="#333333"/>
  <text x="180" y="187" font-family="Merriweather,sans-serif" font-size="7" font-weight="700" fill="#FFFFFF" text-anchor="middle">CONTACT INFORMATION</text>

  <!-- CONTACT NAME -->
  <text x="27" y="201" font-family="Merriweather,sans-serif" font-size="7" font-weight="700" fill="#000000">CONTACT NAME</text>
  <rect x="27" y="204" width="179" height="16" fill="#FFFFFF" stroke="#000000" stroke-width="0.75"/>

  <!-- TITLE / ROLE -->
  <text x="213" y="201" font-family="Merriweather,sans-serif" font-size="7" font-weight="700" fill="#000000">TITLE / ROLE</text>
  <rect x="213" y="204" width="120" height="16" fill="#FFFFFF" stroke="#000000" stroke-width="0.75"/>

  <!-- PHONE -->
  <text x="27" y="229" font-family="Merriweather,sans-serif" font-size="7" font-weight="700" fill="#000000">PHONE</text>
  <rect x="27" y="232" width="140" height="16" fill="#FFFFFF" stroke="#000000" stroke-width="0.75"/>

  <!-- EMAIL -->
  <text x="174" y="229" font-family="Merriweather,sans-serif" font-size="7" font-weight="700" fill="#000000">EMAIL</text>
  <rect x="174" y="232" width="159" height="16" fill="#FFFFFF" stroke="#000000" stroke-width="0.75"/>

  <!-- WEBSITE -->
  <text x="27" y="257" font-family="Merriweather,sans-serif" font-size="7" font-weight="700" fill="#000000">WEBSITE</text>
  <rect x="27" y="260" width="306" height="16" fill="#FFFFFF" stroke="#000000" stroke-width="0.75"/>

  <!-- Section divider label -->
  <rect x="27" y="284" width="306" height="14" fill="#333333"/>
  <text x="180" y="294" font-family="Merriweather,sans-serif" font-size="7" font-weight="700" fill="#FFFFFF" text-anchor="middle">WINES TASTED</text>

  <!-- Wines tasted table header -->
  <rect x="27" y="298" width="200" height="13" fill="#000000"/>
  <text x="37" y="307" font-family="Merriweather,sans-serif" font-size="6.5" font-weight="700" fill="#FFFFFF">WINE NAME &amp; VINTAGE</text>
  <rect x="227" y="298" width="106" height="13" fill="#000000"/>
  <text x="280" y="307" font-family="Merriweather,sans-serif" font-size="6.5" font-weight="700" fill="#FFFFFF" text-anchor="middle">RATING (1-100)</text>

  <!-- Wine rows x5 -->
  <rect x="27" y="311" width="200" height="14" fill="#FFFFFF" stroke="#000000" stroke-width="0.5"/>
  <rect x="227" y="311" width="106" height="14" fill="#FFFFFF" stroke="#000000" stroke-width="0.5"/>

  <rect x="27" y="325" width="200" height="14" fill="#FFFFFF" stroke="#000000" stroke-width="0.5"/>
  <rect x="227" y="325" width="106" height="14" fill="#FFFFFF" stroke="#000000" stroke-width="0.5"/>

  <rect x="27" y="339" width="200" height="14" fill="#FFFFFF" stroke="#000000" stroke-width="0.5"/>
  <rect x="227" y="339" width="106" height="14" fill="#FFFFFF" stroke="#000000" stroke-width="0.5"/>

  <rect x="27" y="353" width="200" height="14" fill="#FFFFFF" stroke="#000000" stroke-width="0.5"/>
  <rect x="227" y="353" width="106" height="14" fill="#FFFFFF" stroke="#000000" stroke-width="0.5"/>

  <rect x="27" y="367" width="200" height="14" fill="#FFFFFF" stroke="#000000" stroke-width="0.5"/>
  <rect x="227" y="367" width="106" height="14" fill="#FFFFFF" stroke="#000000" stroke-width="0.5"/>

  <!-- Section divider label -->
  <rect x="27" y="389" width="306" height="14" fill="#333333"/>
  <text x="180" y="399" font-family="Merriweather,sans-serif" font-size="7" font-weight="700" fill="#FFFFFF" text-anchor="middle">TASTING NOTES &amp; IMPRESSIONS</text>

  <!-- Notes area -->
  <rect x="27" y="403" width="306" height="80" fill="#FFFFFF" stroke="#000000" stroke-width="0.75"/>

  <!-- Horizontal lines inside notes area -->
  <line x1="27" y1="416" x2="333" y2="416" stroke="#CCCCCC" stroke-width="0.5"/>
  <line x1="27" y1="429" x2="333" y2="429" stroke="#CCCCCC" stroke-width="0.5"/>
  <line x1="27" y1="442" x2="333" y2="442" stroke="#CCCCCC" stroke-width="0.5"/>
  <line x1="27" y1="455" x2="333" y2="455" stroke="#CCCCCC" stroke-width="0.5"/>
  <line x1="27" y1="468" x2="333" y2="468" stroke="#CCCCCC" stroke-width="0.5"/>

  <!-- WOULD VISIT AGAIN -->
  <text x="27" y="500" font-family="Merriweather,sans-serif" font-size="7" font-weight="700" fill="#000000">WOULD VISIT AGAIN?</text>
  <!-- Yes checkbox -->
  <rect x="138" y="491" width="10" height="10" fill="#FFFFFF" stroke="#000000" stroke-width="0.75"/>
  <text x="151" y="500" font-family="Merriweather,sans-serif" font-size="7" fill="#000000">Yes</text>
  <!-- No checkbox -->
  <rect x="178" y="491" width="10" height="10" fill="#FFFFFF" stroke="#000000" stroke-width="0.75"/>
  <text x="191" y="500" font-family="Merriweather,sans-serif" font-size="7" fill="#000000">No</text>

  <!-- Page number -->
  <text x="180" y="518" font-family="Merriweather,sans-serif" font-size="7" fill="#000000" text-anchor="middle">___</text>
</svg>
