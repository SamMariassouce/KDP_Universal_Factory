<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="432" height="648" viewBox="0 0 432 648">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Raleway:wght@400;600;700&amp;display=swap');
    </style>
  </defs>

  <!-- White background -->
  <rect width="432" height="648" fill="#FFFFFF"/>

  <!-- ─── HEADER BAR ─── -->
  <rect x="27" y="54" width="378" height="26" fill="#000000"/>
  <text x="216" y="71" font-family="Raleway,sans-serif" font-size="11" font-weight="700" fill="#FFFFFF" text-anchor="middle" letter-spacing="2.5">WINE LABEL COLLECTION</text>

  <!-- ─── WINE LABEL PLACEMENT AREA ─── -->
  <rect x="76" y="88" width="280" height="208" fill="#FAFAFA" stroke="#000000" stroke-width="1" stroke-dasharray="6,4"/>
  <text x="216" y="183" font-family="Raleway,sans-serif" font-size="10" fill="#AAAAAA" text-anchor="middle">Place wine label here</text>
  <text x="216" y="198" font-family="Raleway,sans-serif" font-size="8" fill="#BBBBBB" text-anchor="middle">tape or glue your label in this space</text>

  <!-- ─── DETAILS DIVIDER ─── -->
  <line x1="27" y1="306" x2="405" y2="306" stroke="#000000" stroke-width="0.5"/>
  <text x="27" y="319" font-family="Raleway,sans-serif" font-size="7" font-weight="600" fill="#555555" letter-spacing="2">DETAILS</text>

  <!-- ─── WINE NAME ─── -->
  <text x="27" y="336" font-family="Raleway,sans-serif" font-size="7" font-weight="600" fill="#000000" letter-spacing="1.5">WINE NAME</text>
  <line x1="27" y1="350" x2="405" y2="350" stroke="#000000" stroke-width="0.75"/>

  <!-- ─── VINTAGE / DATE ROW ─── -->
  <text x="27" y="366" font-family="Raleway,sans-serif" font-size="7" font-weight="600" fill="#000000" letter-spacing="1.5">VINTAGE</text>
  <line x1="27" y1="380" x2="195" y2="380" stroke="#000000" stroke-width="0.75"/>
  <text x="222" y="366" font-family="Raleway,sans-serif" font-size="7" font-weight="600" fill="#000000" letter-spacing="1.5">DATE TASTED</text>
  <line x1="222" y1="380" x2="405" y2="380" stroke="#000000" stroke-width="0.75"/>

  <!-- ─── REGION / PRODUCER ROW ─── -->
  <text x="27" y="396" font-family="Raleway,sans-serif" font-size="7" font-weight="600" fill="#000000" letter-spacing="1.5">REGION</text>
  <line x1="27" y1="410" x2="195" y2="410" stroke="#000000" stroke-width="0.75"/>
  <text x="222" y="396" font-family="Raleway,sans-serif" font-size="7" font-weight="600" fill="#000000" letter-spacing="1.5">PRODUCER</text>
  <line x1="222" y1="410" x2="405" y2="410" stroke="#000000" stroke-width="0.75"/>

  <!-- ─── PRICE / RATING ROW ─── -->
  <text x="27" y="426" font-family="Raleway,sans-serif" font-size="7" font-weight="600" fill="#000000" letter-spacing="1.5">PRICE</text>
  <line x1="27" y1="440" x2="128" y2="440" stroke="#000000" stroke-width="0.75"/>
  <text x="222" y="426" font-family="Raleway,sans-serif" font-size="7" font-weight="600" fill="#000000" letter-spacing="1.5">MY RATING</text>
  <!-- 5 rating boxes (SVG rect - no unicode) -->
  <rect x="284" y="414" width="18" height="18" fill="#FFFFFF" stroke="#000000" stroke-width="1"/>
  <rect x="306" y="414" width="18" height="18" fill="#FFFFFF" stroke="#000000" stroke-width="1"/>
  <rect x="328" y="414" width="18" height="18" fill="#FFFFFF" stroke="#000000" stroke-width="1"/>
  <rect x="350" y="414" width="18" height="18" fill="#FFFFFF" stroke="#000000" stroke-width="1"/>
  <rect x="372" y="414" width="18" height="18" fill="#FFFFFF" stroke="#000000" stroke-width="1"/>

  <!-- ─── NOTES SECTION ─── -->
  <text x="27" y="456" font-family="Raleway,sans-serif" font-size="7" font-weight="600" fill="#000000" letter-spacing="1.5">NOTES</text>
  <rect x="27" y="460" width="378" height="118" fill="#FFFFFF" stroke="#000000" stroke-width="0.75"/>
  <line x1="36" y1="477" x2="396" y2="477" stroke="#E0E0E0" stroke-width="0.5"/>
  <line x1="36" y1="494" x2="396" y2="494" stroke="#E0E0E0" stroke-width="0.5"/>
  <line x1="36" y1="511" x2="396" y2="511" stroke="#E0E0E0" stroke-width="0.5"/>
  <line x1="36" y1="528" x2="396" y2="528" stroke="#E0E0E0" stroke-width="0.5"/>
  <line x1="36" y1="545" x2="396" y2="545" stroke="#E0E0E0" stroke-width="0.5"/>
  <line x1="36" y1="562" x2="396" y2="562" stroke="#E0E0E0" stroke-width="0.5"/>

  <!-- ─── PAGE NUMBER ─── -->
  <text x="216" y="590" font-family="Raleway,sans-serif" font-size="9" fill="#000000" text-anchor="middle">- 1 -</text>
</svg>
