  <text x="27" y="488" font-family="Raleway,sans-serif" font-size="7" font-weight="600" fill="#000000" letter-spacing="1.5">FINAL IMPRESSION</text>
  <rect x="27" y="492" width="378" height="88" fill="#FFFFFF" stroke="#000000" stroke-width="0.75"/>
  <line x1="36" y1="509" x2="396" y2="509" stroke="#E0E0E0" stroke-width="0.5"/>
  <line x1="36" y1="526" x2="396" y2="526" stroke="#E0E0E0" stroke-width="0.5"/>
  <line x1="36" y1="543" x2="396" y2="543" stroke="#E0E0E0" stroke-width="0.5"/>
  <line x1="36" y1="560" x2="396" y2="560" stroke="#E0E0E0" stroke-width="0.5"/>

  <!-- ─── PAGE NUMBER ─── -->
  <text x="216" y="590" font-family="Raleway,sans-serif" font-size="9" fill="#000000" text-anchor="middle">- 1 -</text>
