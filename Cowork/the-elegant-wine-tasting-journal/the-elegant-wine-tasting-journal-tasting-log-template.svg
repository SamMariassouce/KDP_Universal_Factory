  <text x="27" y="467" font-family="Raleway,sans-serif" font-size="7" font-weight="600" fill="#000000" letter-spacing="1.5">OVERALL RATING</text>
  <!-- 5 large rating boxes -->
  <rect x="148" y="456" width="20" height="20" fill="#FFFFFF" stroke="#000000" stroke-width="1"/>
  <rect x="172" y="456" width="20" height="20" fill="#FFFFFF" stroke="#000000" stroke-width="1"/>
  <rect x="196" y="456" width="20" height="20" fill="#FFFFFF" stroke="#000000" stroke-width="1"/>
  <rect x="220" y="456" width="20" height="20" fill="#FFFFFF" stroke="#000000" stroke-width="1"/>
  <rect x="244" y="456" width="20" height="20" fill="#FFFFFF" stroke="#000000" stroke-width="1"/>

