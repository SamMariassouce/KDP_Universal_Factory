  <text x="27" y="233" font-family="Raleway,sans-serif" font-size="7" font-weight="600" fill="#000000" letter-spacing="1.5">OCCASION / SETTING</text>
  <line x1="27" y1="247" x2="405" y2="247" stroke="#000000" stroke-width="0.75"/>

