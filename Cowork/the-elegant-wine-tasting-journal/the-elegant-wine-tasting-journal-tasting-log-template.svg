  <rect x="119" y="413" width="16" height="14" fill="#FFFFFF" stroke="#000000" stroke-width="0.75"/>
  <rect x="138" y="413" width="16" height="14" fill="#FFFFFF" stroke="#000000" stroke-width="0.75"/>
  <rect x="157" y="413" width="16" height="14" fill="#FFFFFF" stroke="#000000" stroke-width="0.75"/>
  <rect x="176" y="413" width="16" height="14" fill="#FFFFFF" stroke="#000000" stroke-width="0.75"/>

