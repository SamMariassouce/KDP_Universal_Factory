<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="432" height="648" viewBox="0 0 432 648">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Raleway:wght@400;600;700&amp;display=swap');
    </style>
  </defs>

  <!-- White background -->
  <rect width="432" height="648" fill="#FFFFFF"/>

  <!-- ─── HEADER BAR ─── -->
  <rect x="27" y="54" width="378" height="26" fill="#000000"/>
  <text x="216" y="71" font-family="Raleway,sans-serif" font-size="11" font-weight="700" fill="#FFFFFF" text-anchor="middle" letter-spacing="2.5">TASTING NOTES</text>

  <!-- ─── WINE NAME ─── -->
  <text x="27" y="93" font-family="Raleway,sans-serif" font-size="7" font-weight="600" fill="#000000" letter-spacing="1.5">WINE NAME</text>
  <line x1="27" y1="107" x2="405" y2="107" stroke="#000000" stroke-width="0.75"/>

  <!-- ─── VINTAGE / DATE ROW ─── -->
  <text x="27" y="121" font-family="Raleway,sans-serif" font-size="7" font-weight="600" fill="#000000" letter-spacing="1.5">VINTAGE</text>
  <line x1="27" y1="135" x2="195" y2="135" stroke="#000000" stroke-width="0.75"/>
  <text x="222" y="121" font-family="Raleway,sans-serif" font-size="7" font-weight="600" fill="#000000" letter-spacing="1.5">DATE TASTED</text>
  <line x1="222" y1="135" x2="405" y2="135" stroke="#000000" stroke-width="0.75"/>

  <!-- ─── REGION / GRAPE ROW ─── -->
  <text x="27" y="149" font-family="Raleway,sans-serif" font-size="7" font-weight="600" fill="#000000" letter-spacing="1.5">REGION</text>
