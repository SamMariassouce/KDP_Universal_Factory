  <text x="222" y="149" font-family="Raleway,sans-serif" font-size="7" font-weight="600" fill="#000000" letter-spacing="1.5">GRAPE VARIETY</text>
  <line x1="222" y1="163" x2="405" y2="163" stroke="#000000" stroke-width="0.75"/>

  <!-- ─── PRODUCER ─── -->
  <text x="27" y="177" font-family="Raleway,sans-serif" font-size="7" font-weight="600" fill="#000000" letter-spacing="1.5">PRODUCER</text>
  <line x1="27" y1="191" x2="405" y2="191" stroke="#000000" stroke-width="0.75"/>

