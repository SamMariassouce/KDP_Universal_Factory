  <text x="222" y="403" font-family="Raleway,sans-serif" font-size="7" font-weight="600" fill="#000000" letter-spacing="1">ACIDITY</text>
  <rect x="280" y="392" width="16" height="14" fill="#FFFFFF" stroke="#000000" stroke-width="0.75"/>
