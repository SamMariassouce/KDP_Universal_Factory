  <rect x="318" y="413" width="16" height="14" fill="#FFFFFF" stroke="#000000" stroke-width="0.75"/>
  <rect x="337" y="413" width="16" height="14" fill="#FFFFFF" stroke="#000000" stroke-width="0.75"/>
  <rect x="356" y="413" width="16" height="14" fill="#FFFFFF" stroke="#000000" stroke-width="0.75"/>

