  <line x1="33" y1="384" x2="399" y2="384" stroke="#CCCCCC" stroke-width="0.5"/>
  <line x1="33" y1="398" x2="399" y2="398" stroke="#CCCCCC" stroke-width="0.5"/>
  <line x1="33" y1="412" x2="399" y2="412" stroke="#CCCCCC" stroke-width="0.5"/>
  <line x1="33" y1="426" x2="399" y2="426" stroke="#CCCCCC" stroke-width="0.5"/>
  <line x1="33" y1="440" x2="399" y2="440" stroke="#CCCCCC" stroke-width="0.5"/>
