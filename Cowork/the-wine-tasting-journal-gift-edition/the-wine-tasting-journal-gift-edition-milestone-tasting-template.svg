  <rect x="63" y="459" width="12" height="12" fill="#FFFFFF" stroke="#000000" stroke-width="0.75"/>
  <rect x="79" y="459" width="12" height="12" fill="#FFFFFF" stroke="#000000" stroke-width="0.75"/>
  <rect x="95" y="459" width="12" height="12" fill="#FFFFFF" stroke="#000000" stroke-width="0.75"/>
  <rect x="111" y="459" width="12" height="12" fill="#FFFFFF" stroke="#000000" stroke-width="0.75"/>
