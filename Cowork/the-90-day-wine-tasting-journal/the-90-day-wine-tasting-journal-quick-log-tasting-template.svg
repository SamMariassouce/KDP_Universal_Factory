<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="432" height="648" viewBox="0 0 432 648">

  <!-- White background -->
  <rect width="432" height="648" fill="#FFFFFF"/>

  <!-- WINE TASTING LOG header bar -->
  <rect x="27" y="58" width="378" height="22" fill="#000000"/>
  <text x="216" y="74" text-anchor="middle" font-family="Merriweather,sans-serif" font-size="13" font-weight="bold" fill="#FFFFFF">WINE TASTING LOG</text>

  <!-- Wine Name -->
  <text x="27" y="92" font-family="Merriweather,sans-serif" font-size="8" fill="#333333">WINE NAME</text>
  <line x1="27" y1="100" x2="405" y2="100" stroke="#000000" stroke-width="0.75"/>

  <!-- Winery -->
  <text x="27" y="114" font-family="Merriweather,sans-serif" font-size="8" fill="#333333">WINERY / PRODUCER</text>
  <line x1="27" y1="122" x2="405" y2="122" stroke="#000000" stroke-width="0.75"/>

  <!-- Three columns: Vintage | Varietal | Price -->
  <text x="27" y="136" font-family="Merriweather,sans-serif" font-size="8" fill="#333333">VINTAGE</text>
  <line x1="27" y1="144" x2="143" y2="144" stroke="#000000" stroke-width="0.75"/>
  <text x="153" y="136" font-family="Merriweather,sans-serif" font-size="8" fill="#333333">VARIETAL</text>
  <line x1="153" y1="144" x2="289" y2="144" stroke="#000000" stroke-width="0.75"/>
  <text x="299" y="136" font-family="Merriweather,sans-serif" font-size="8" fill="#333333">PRICE</text>
  <line x1="299" y1="144" x2="405" y2="144" stroke="#000000" stroke-width="0.75"/>

  <!-- Region / Appellation -->
  <text x="27" y="158" font-family="Merriweather,sans-serif" font-size="8" fill="#333333">REGION / APPELLATION</text>
  <line x1="27" y1="166" x2="405" y2="166" stroke="#000000" stroke-width="0.75"/>

  <!-- Rating (5 boxes) + Date -->
  <text x="27" y="180" font-family="Merriweather,sans-serif" font-size="8" fill="#333333">RATING</text>
  <rect x="75" y="170" width="16" height="16" fill="#FFFFFF" stroke="#000000" stroke-width="0.75"/>
  <rect x="95" y="170" width="16" height="16" fill="#FFFFFF" stroke="#000000" stroke-width="0.75"/>
  <rect x="115" y="170" width="16" height="16" fill="#FFFFFF" stroke="#000000" stroke-width="0.75"/>
  <rect x="135" y="170" width="16" height="16" fill="#FFFFFF" stroke="#000000" stroke-width="0.75"/>
  <rect x="155" y="170" width="16" height="16" fill="#FFFFFF" stroke="#000000" stroke-width="0.75"/>
  <text x="260" y="180" font-family="Merriweather,sans-serif" font-size="8" fill="#333333">DATE</text>
  <line x1="285" y1="186" x2="405" y2="186" stroke="#000000" stroke-width="0.75"/>

  <!-- APPEARANCE section header -->
  <rect x="27" y="196" width="378" height="18" fill="#000000"/>
  <text x="216" y="209" text-anchor="middle" font-family="Merriweather,sans-serif" font-size="10" fill="#FFFFFF">APPEARANCE</text>

  <!-- Color + Clarity -->
  <text x="27" y="228" font-family="Merriweather,sans-serif" font-size="8" fill="#333333">COLOR</text>
  <line x1="27" y1="234" x2="205" y2="234" stroke="#000000" stroke-width="0.75"/>
  <text x="215" y="228" font-family="Merriweather,sans-serif" font-size="8" fill="#333333">CLARITY</text>
  <line x1="250" y1="234" x2="405" y2="234" stroke="#000000" stroke-width="0.75"/>

  <!-- AROMAS section header -->
  <rect x="27" y="244" width="378" height="18" fill="#000000"/>
  <text x="216" y="257" text-anchor="middle" font-family="Merriweather,sans-serif" font-size="10" fill="#FFFFFF">AROMAS</text>

  <!-- Aroma write lines (3) -->
  <line x1="27" y1="274" x2="405" y2="274" stroke="#000000" stroke-width="0.75"/>
  <line x1="27" y1="289" x2="405" y2="289" stroke="#000000" stroke-width="0.75"/>
  <line x1="27" y1="304" x2="405" y2="304" stroke="#000000" stroke-width="0.75"/>

  <!-- PALATE section header -->
  <rect x="27" y="314" width="378" height="18" fill="#000000"/>
  <text x="216" y="327" text-anchor="middle" font-family="Merriweather,sans-serif" font-size="10" fill="#FFFFFF">PALATE</text>

  <!-- Palate write lines (3) -->
  <line x1="27" y1="344" x2="405" y2="344" stroke="#000000" stroke-width="0.75"/>
  <line x1="27" y1="359" x2="405" y2="359" stroke="#000000" stroke-width="0.75"/>
  <line x1="27" y1="374" x2="405" y2="374" stroke="#000000" stroke-width="0.75"/>

  <!-- FINISH section header -->
  <rect x="27" y="384" width="378" height="18" fill="#000000"/>
  <text x="216" y="397" text-anchor="middle" font-family="Merriweather,sans-serif" font-size="10" fill="#FFFFFF">FINISH</text>

  <!-- Finish write line (1) -->
  <line x1="27" y1="414" x2="405" y2="414" stroke="#000000" stroke-width="0.75"/>

  <!-- FLAVOR PROFILE section header -->
  <rect x="27" y="424" width="378" height="18" fill="#000000"/>
  <text x="216" y="437" text-anchor="middle" font-family="Merriweather,sans-serif" font-size="10" fill="#FFFFFF">FLAVOR PROFILE</text>

  <!-- Flavor checkboxes Row 1: Fruity | Floral | Earthy | Spicy -->
  <rect x="27" y="448" width="10" height="10" fill="#FFFFFF" stroke="#000000" stroke-width="0.75"/>
  <text x="41" y="457" font-family="Merriweather,sans-serif" font-size="8" fill="#333333">Fruity</text>
  <rect x="121" y="448" width="10" height="10" fill="#FFFFFF" stroke="#000000" stroke-width="0.75"/>
  <text x="135" y="457" font-family="Merriweather,sans-serif" font-size="8" fill="#333333">Floral</text>
  <rect x="215" y="448" width="10" height="10" fill="#FFFFFF" stroke="#000000" stroke-width="0.75"/>
  <text x="229" y="457" font-family="Merriweather,sans-serif" font-size="8" fill="#333333">Earthy</text>
  <rect x="309" y="448" width="10" height="10" fill="#FFFFFF" stroke="#000000" stroke-width="0.75"/>
  <text x="323" y="457" font-family="Merriweather,sans-serif" font-size="8" fill="#333333">Spicy</text>

  <!-- Flavor checkboxes Row 2: Oaky | Mineral | Herbal | Sweet -->
  <rect x="27" y="464" width="10" height="10" fill="#FFFFFF" stroke="#000000" stroke-width="0.75"/>
  <text x="41" y="473" font-family="Merriweather,sans-serif" font-size="8" fill="#333333">Oaky</text>
  <rect x="121" y="464" width="10" height="10" fill="#FFFFFF" stroke="#000000" stroke-width="0.75"/>
  <text x="135" y="473" font-family="Merriweather,sans-serif" font-size="8" fill="#333333">Mineral</text>
  <rect x="215" y="464" width="10" height="10" fill="#FFFFFF" stroke="#000000" stroke-width="0.75"/>
  <text x="229" y="473" font-family="Merriweather,sans-serif" font-size="8" fill="#333333">Herbal</text>
  <rect x="309" y="464" width="10" height="10" fill="#FFFFFF" stroke="#000000" stroke-width="0.75"/>
  <text x="323" y="473" font-family="Merriweather,sans-serif" font-size="8" fill="#333333">Sweet</text>

  <!-- OVERALL NOTES section header -->
  <rect x="27" y="484" width="378" height="18" fill="#000000"/>
  <text x="216" y="497" text-anchor="middle" font-family="Merriweather,sans-serif" font-size="10" fill="#FFFFFF">OVERALL NOTES</text>

  <!-- Notes write lines (2) -->
  <line x1="27" y1="514" x2="405" y2="514" stroke="#000000" stroke-width="0.75"/>
  <line x1="27" y1="529" x2="405" y2="529" stroke="#000000" stroke-width="0.75"/>

  <!-- Would Buy Again + Paired With -->
  <text x="27" y="550" font-family="Merriweather,sans-serif" font-size="8" fill="#333333">WOULD BUY AGAIN?</text>
  <rect x="158" y="540" width="32" height="14" fill="#FFFFFF" stroke="#000000" stroke-width="0.75"/>
  <text x="174" y="551" text-anchor="middle" font-family="Merriweather,sans-serif" font-size="8" fill="#333333">YES</text>
  <rect x="196" y="540" width="32" height="14" fill="#FFFFFF" stroke="#000000" stroke-width="0.75"/>
  <text x="212" y="551" text-anchor="middle" font-family="Merriweather,sans-serif" font-size="8" fill="#333333">NO</text>
  <text x="240" y="550" font-family="Merriweather,sans-serif" font-size="8" fill="#333333">PAIRED WITH</text>
  <line x1="298" y1="554" x2="405" y2="554" stroke="#000000" stroke-width="0.75"/>

  <!-- Page number placeholder -->
  <text x="216" y="582" text-anchor="middle" font-family="Merriweather,sans-serif" font-size="9" fill="#333333">#</text>

</svg>
