<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="432" height="648" viewBox="0 0 432 648">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&amp;display=swap');
    </style>
  </defs>

  <!-- White background -->
  <rect width="432" height="648" fill="#FFFFFF"/>

  <!-- HEADER BAR -->
  <rect x="27" y="54" width="378" height="26" fill="#000000"/>
  <text x="216" y="71" font-family="Roboto,sans-serif" font-size="11" font-weight="700" fill="#FFFFFF" text-anchor="middle" letter-spacing="2.5">WINE TASTING LOG</text>

  <!-- ===== ENTRY 1 ===== -->

  <!-- Wine Name -->
  <text x="27" y="94" font-family="Roboto,sans-serif" font-size="7" font-weight="700" fill="#000000" letter-spacing="1.5">WINE</text>
  <line x1="27" y1="108" x2="405" y2="108" stroke="#000000" stroke-width="0.75"/>

  <!-- Date + Type row -->
  <text x="27" y="123" font-family="Roboto,sans-serif" font-size="7" font-weight="700" fill="#000000" letter-spacing="1.5">DATE</text>
  <line x1="27" y1="137" x2="107" y2="137" stroke="#000000" stroke-width="0.75"/>
  <text x="117" y="123" font-family="Roboto,sans-serif" font-size="7" font-weight="700" fill="#000000" letter-spacing="1">TYPE</text>
  <!-- RED -->
  <rect x="153" y="113" width="12" height="12" fill="#FFFFFF" stroke="#000000" stroke-width="0.75"/>
  <text x="169" y="123" font-family="Roboto,sans-serif" font-size="7" fill="#000000">RED</text>
  <!-- WHITE -->
  <rect x="207" y="113" width="12" height="12" fill="#FFFFFF" stroke="#000000" stroke-width="0.75"/>
  <text x="223" y="123" font-family="Roboto,sans-serif" font-size="7" fill="#000000">WHITE</text>
  <!-- ROSE -->
  <rect x="272" y="113" width="12" height="12" fill="#FFFFFF" stroke="#000000" stroke-width="0.75"/>
  <text x="288" y="123" font-family="Roboto,sans-serif" font-size="7" fill="#000000">ROSE</text>
  <!-- SPARKLING -->
  <rect x="336" y="113" width="12" height="12" fill="#FFFFFF" stroke="#000000" stroke-width="0.75"/>
  <text x="352" y="123" font-family="Roboto,sans-serif" font-size="7" fill="#000000">SPAR.</text>

  <!-- Rating row (5 boxes) -->
  <text x="27" y="151" font-family="Roboto,sans-serif" font-size="7" font-weight="700" fill="#000000" letter-spacing="1">MY RATING</text>
  <rect x="108" y="139" width="18" height="18" fill="#FFFFFF" stroke="#000000" stroke-width="1"/>
  <rect x="130" y="139" width="18" height="18" fill="#FFFFFF" stroke="#000000" stroke-width="1"/>
  <rect x="152" y="139" width="18" height="18" fill="#FFFFFF" stroke="#000000" stroke-width="1"/>
  <rect x="174" y="139" width="18" height="18" fill="#FFFFFF" stroke="#000000" stroke-width="1"/>
  <rect x="196" y="139" width="18" height="18" fill="#FFFFFF" stroke="#000000" stroke-width="1"/>
  <text x="219" y="151" font-family="Roboto,sans-serif" font-size="7" fill="#888888">/ 5</text>

  <!-- Notes box -->
  <text x="27" y="169" font-family="Roboto,sans-serif" font-size="7" font-weight="700" fill="#000000" letter-spacing="1.5">NOTES</text>
  <rect x="27" y="173" width="378" height="128" fill="#FFFFFF" stroke="#000000" stroke-width="0.75"/>
  <line x1="35" y1="190" x2="397" y2="190" stroke="#E0E0E0" stroke-width="0.5"/>
  <line x1="35" y1="207" x2="397" y2="207" stroke="#E0E0E0" stroke-width="0.5"/>
  <line x1="35" y1="224" x2="397" y2="224" stroke="#E0E0E0" stroke-width="0.5"/>
  <line x1="35" y1="241" x2="397" y2="241" stroke="#E0E0E0" stroke-width="0.5"/>
  <line x1="35" y1="258" x2="397" y2="258" stroke="#E0E0E0" stroke-width="0.5"/>
  <line x1="35" y1="275" x2="397" y2="275" stroke="#E0E0E0" stroke-width="0.5"/>
  <line x1="35" y1="292" x2="397" y2="292" stroke="#E0E0E0" stroke-width="0.5"/>

  <!-- Entry separator -->
  <line x1="27" y1="313" x2="405" y2="313" stroke="#CCCCCC" stroke-width="0.75" stroke-dasharray="4,3"/>

  <!-- ===== ENTRY 2 ===== -->

  <!-- Wine Name -->
  <text x="27" y="336" font-family="Roboto,sans-serif" font-size="7" font-weight="700" fill="#000000" letter-spacing="1.5">WINE</text>
  <line x1="27" y1="350" x2="405" y2="350" stroke="#000000" stroke-width="0.75"/>

  <!-- Date + Type row -->
  <text x="27" y="365" font-family="Roboto,sans-serif" font-size="7" font-weight="700" fill="#000000" letter-spacing="1.5">DATE</text>
  <line x1="27" y1="379" x2="107" y2="379" stroke="#000000" stroke-width="0.75"/>
  <text x="117" y="365" font-family="Roboto,sans-serif" font-size="7" font-weight="700" fill="#000000" letter-spacing="1">TYPE</text>
  <!-- RED -->
  <rect x="153" y="355" width="12" height="12" fill="#FFFFFF" stroke="#000000" stroke-width="0.75"/>
  <text x="169" y="365" font-family="Roboto,sans-serif" font-size="7" fill="#000000">RED</text>
  <!-- WHITE -->
  <rect x="207" y="355" width="12" height="12" fill="#FFFFFF" stroke="#000000" stroke-width="0.75"/>
  <text x="223" y="365" font-family="Roboto,sans-serif" font-size="7" fill="#000000">WHITE</text>
  <!-- ROSE -->
  <rect x="272" y="355" width="12" height="12" fill="#FFFFFF" stroke="#000000" stroke-width="0.75"/>
  <text x="288" y="365" font-family="Roboto,sans-serif" font-size="7" fill="#000000">ROSE</text>
  <!-- SPARKLING -->
  <rect x="336" y="355" width="12" height="12" fill="#FFFFFF" stroke="#000000" stroke-width="0.75"/>
  <text x="352" y="365" font-family="Roboto,sans-serif" font-size="7" fill="#000000">SPAR.</text>

  <!-- Rating row (5 boxes) -->
  <text x="27" y="393" font-family="Roboto,sans-serif" font-size="7" font-weight="700" fill="#000000" letter-spacing="1">MY RATING</text>
  <rect x="108" y="381" width="18" height="18" fill="#FFFFFF" stroke="#000000" stroke-width="1"/>
  <rect x="130" y="381" width="18" height="18" fill="#FFFFFF" stroke="#000000" stroke-width="1"/>
  <rect x="152" y="381" width="18" height="18" fill="#FFFFFF" stroke="#000000" stroke-width="1"/>
  <rect x="174" y="381" width="18" height="18" fill="#FFFFFF" stroke="#000000" stroke-width="1"/>
  <rect x="196" y="381" width="18" height="18" fill="#FFFFFF" stroke="#000000" stroke-width="1"/>
  <text x="219" y="393" font-family="Roboto,sans-serif" font-size="7" fill="#888888">/ 5</text>

  <!-- Notes box -->
  <text x="27" y="411" font-family="Roboto,sans-serif" font-size="7" font-weight="700" fill="#000000" letter-spacing="1.5">NOTES</text>
  <rect x="27" y="415" width="378" height="128" fill="#FFFFFF" stroke="#000000" stroke-width="0.75"/>
  <line x1="35" y1="432" x2="397" y2="432" stroke="#E0E0E0" stroke-width="0.5"/>
  <line x1="35" y1="449" x2="397" y2="449" stroke="#E0E0E0" stroke-width="0.5"/>
  <line x1="35" y1="466" x2="397" y2="466" stroke="#E0E0E0" stroke-width="0.5"/>
  <line x1="35" y1="483" x2="397" y2="483" stroke="#E0E0E0" stroke-width="0.5"/>
  <line x1="35" y1="500" x2="397" y2="500" stroke="#E0E0E0" stroke-width="0.5"/>
  <line x1="35" y1="517" x2="397" y2="517" stroke="#E0E0E0" stroke-width="0.5"/>
  <line x1="35" y1="534" x2="397" y2="534" stroke="#E0E0E0" stroke-width="0.5"/>

  <!-- PAGE NUMBER -->
  <text x="216" y="590" font-family="Roboto,sans-serif" font-size="9" fill="#000000" text-anchor="middle">- 1 -</text>
</svg>
