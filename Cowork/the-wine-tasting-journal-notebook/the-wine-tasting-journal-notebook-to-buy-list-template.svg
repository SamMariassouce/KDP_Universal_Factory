  </defs>

  <!-- White background -->
  <rect width="432" height="648" fill="#FFFFFF"/>

  <!-- HEADER BAR -->
  <rect x="27" y="54" width="378" height="26" fill="#000000"/>
  <text x="216" y="71" font-family="Roboto,sans-serif" font-size="11" font-weight="700" fill="#FFFFFF" text-anchor="middle" letter-spacing="2.5">WINES TO BUY</text>

  <!-- TABLE COLUMN HEADERS -->
  <rect x="27" y="80" width="378" height="20" fill="#333333"/>
  <!-- Header text -->
  <text x="37" y="94" font-family="Roboto,sans-serif" font-size="7" font-weight="700" fill="#FFFFFF" letter-spacing="1">GOT IT</text>
  <text x="155" y="94" font-family="Roboto,sans-serif" font-size="7" font-weight="700" fill="#FFFFFF" text-anchor="middle" letter-spacing="1">WINE NAME</text>
  <text x="315" y="94" font-family="Roboto,sans-serif" font-size="7" font-weight="700" fill="#FFFFFF" text-anchor="middle" letter-spacing="1">WHERE TO FIND IT</text>
  <text x="375" y="94" font-family="Roboto,sans-serif" font-size="7" font-weight="700" fill="#FFFFFF" text-anchor="middle" letter-spacing="1">PRICE</text>

  <!-- TABLE OUTER BORDER -->
  <rect x="27" y="80" width="378" height="458" fill="none" stroke="#000000" stroke-width="0.75"/>

