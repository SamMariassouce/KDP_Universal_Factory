<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="504" height="720" viewBox="0 0 504 720">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&amp;display=swap');
    </style>
  </defs>

  <!-- White background -->
  <rect width="504" height="720" fill="#FFFFFF"/>

  <!-- HEADER BAR -->
  <rect x="36" y="54" width="441" height="28" fill="#000000"/>
  <text x="257" y="73" font-family="Merriweather,sans-serif" font-size="11" font-weight="700" fill="#FFFFFF" text-anchor="middle" letter-spacing="2">WINE INVESTMENT &amp; VALUE LOG</text>

  <!-- WINE IDENTIFICATION -->
  <text x="36" y="97" font-family="Merriweather,sans-serif" font-size="7" font-weight="700" fill="#000000" letter-spacing="1.5">WINE NAME</text>
  <line x1="36" y1="112" x2="477" y2="112" stroke="#000000" stroke-width="0.75"/>

  <!-- Vintage / Producer / Region -->
  <text x="36" y="126" font-family="Merriweather,sans-serif" font-size="7" font-weight="700" fill="#000000" letter-spacing="1.5">VINTAGE</text>
  <line x1="36" y1="141" x2="116" y2="141" stroke="#000000" stroke-width="0.75"/>
  <text x="126" y="126" font-family="Merriweather,sans-serif" font-size="7" font-weight="700" fill="#000000" letter-spacing="1.5">PRODUCER</text>
  <line x1="126" y1="141" x2="286" y2="141" stroke="#000000" stroke-width="0.75"/>
  <text x="296" y="126" font-family="Merriweather,sans-serif" font-size="7" font-weight="700" fill="#000000" letter-spacing="1.5">REGION / APPELLATION</text>
  <line x1="296" y1="141" x2="477" y2="141" stroke="#000000" stroke-width="0.75"/>

  <!-- Grape / Classification / Score -->
  <text x="36" y="155" font-family="Merriweather,sans-serif" font-size="7" font-weight="700" fill="#000000" letter-spacing="1.5">GRAPE VARIETY</text>
  <line x1="36" y1="170" x2="196" y2="170" stroke="#000000" stroke-width="0.75"/>
  <text x="206" y="155" font-family="Merriweather,sans-serif" font-size="7" font-weight="700" fill="#000000" letter-spacing="1.5">CLASSIFICATION</text>
  <line x1="206" y1="170" x2="366" y2="170" stroke="#000000" stroke-width="0.75"/>
  <text x="376" y="155" font-family="Merriweather,sans-serif" font-size="7" font-weight="700" fill="#000000" letter-spacing="1.5">SCORE</text>
  <line x1="376" y1="170" x2="477" y2="170" stroke="#000000" stroke-width="0.75"/>

  <!-- Date / Qty / Price / Storage -->
  <text x="36" y="184" font-family="Merriweather,sans-serif" font-size="7" font-weight="700" fill="#000000" letter-spacing="1.5">DATE ACQUIRED</text>
  <line x1="36" y1="199" x2="146" y2="199" stroke="#000000" stroke-width="0.75"/>
  <text x="156" y="184" font-family="Merriweather,sans-serif" font-size="7" font-weight="700" fill="#000000" letter-spacing="1.5">QTY PURCHASED</text>
  <line x1="156" y1="199" x2="256" y2="199" stroke="#000000" stroke-width="0.75"/>
  <text x="266" y="184" font-family="Merriweather,sans-serif" font-size="7" font-weight="700" fill="#000000" letter-spacing="1.5">PRICE / BOTTLE</text>
  <line x1="266" y1="199" x2="366" y2="199" stroke="#000000" stroke-width="0.75"/>
  <text x="376" y="184" font-family="Merriweather,sans-serif" font-size="7" font-weight="700" fill="#000000" letter-spacing="1.5">TOTAL INVESTED</text>
  <line x1="376" y1="199" x2="477" y2="199" stroke="#000000" stroke-width="0.75"/>

  <!-- Storage / Insurance / Vendor -->
  <text x="36" y="213" font-family="Merriweather,sans-serif" font-size="7" font-weight="700" fill="#000000" letter-spacing="1.5">STORAGE FACILITY</text>
  <line x1="36" y1="228" x2="196" y2="228" stroke="#000000" stroke-width="0.75"/>
  <text x="206" y="213" font-family="Merriweather,sans-serif" font-size="7" font-weight="700" fill="#000000" letter-spacing="1.5">INSURANCE VALUE</text>
  <line x1="206" y1="228" x2="336" y2="228" stroke="#000000" stroke-width="0.75"/>
  <text x="346" y="213" font-family="Merriweather,sans-serif" font-size="7" font-weight="700" fill="#000000" letter-spacing="1.5">BOTTLES REMAINING</text>
  <line x1="346" y1="228" x2="477" y2="228" stroke="#000000" stroke-width="0.75"/>

  <!-- MARKET VALUE HISTORY section -->
  <rect x="36" y="236" width="441" height="18" fill="#1A1A1A"/>
  <text x="257" y="249" font-family="Merriweather,sans-serif" font-size="8" font-weight="700" fill="#FFFFFF" text-anchor="middle" letter-spacing="2">MARKET VALUE HISTORY</text>

  <!-- Table outer border -->
  <rect x="36" y="254" width="441" height="234" fill="#FFFFFF" stroke="#000000" stroke-width="0.75"/>

  <!-- Table header row -->
  <rect x="36" y="254" width="441" height="22" fill="#333333"/>
  <text x="86" y="269" font-family="Merriweather,sans-serif" font-size="7" font-weight="700" fill="#FFFFFF" text-anchor="middle" letter-spacing="1">DATE</text>
  <text x="194" y="269" font-family="Merriweather,sans-serif" font-size="7" font-weight="700" fill="#FFFFFF" text-anchor="middle" letter-spacing="1">VALUE / BOTTLE</text>
  <text x="314" y="269" font-family="Merriweather,sans-serif" font-size="7" font-weight="700" fill="#FFFFFF" text-anchor="middle" letter-spacing="1">TOTAL PORTFOLIO VALUE</text>
  <text x="439" y="269" font-family="Merriweather,sans-serif" font-size="7" font-weight="700" fill="#FFFFFF" text-anchor="middle" letter-spacing="1">SOURCE</text>

  <!-- Column dividers -->
  <line x1="136" y1="254" x2="136" y2="488" stroke="#000000" stroke-width="0.75"/>
  <line x1="252" y1="254" x2="252" y2="488" stroke="#000000" stroke-width="0.75"/>
  <line x1="376" y1="254" x2="376" y2="488" stroke="#000000" stroke-width="0.75"/>

  <!-- Row dividers (5 data rows of 42px each) -->
  <line x1="36" y1="276" x2="477" y2="276" stroke="#000000" stroke-width="0.5"/>
  <line x1="36" y1="318" x2="477" y2="318" stroke="#000000" stroke-width="0.5"/>
  <line x1="36" y1="360" x2="477" y2="360" stroke="#000000" stroke-width="0.5"/>
  <line x1="36" y1="402" x2="477" y2="402" stroke="#000000" stroke-width="0.5"/>
  <line x1="36" y1="444" x2="477" y2="444" stroke="#000000" stroke-width="0.5"/>

  <!-- DISPOSITION section -->
  <rect x="36" y="496" width="441" height="18" fill="#1A1A1A"/>
  <text x="257" y="509" font-family="Merriweather,sans-serif" font-size="8" font-weight="700" fill="#FFFFFF" text-anchor="middle" letter-spacing="2">DISPOSITION &amp; OUTCOME</text>

  <!-- Status checkboxes -->
  <text x="36" y="526" font-family="Merriweather,sans-serif" font-size="7" font-weight="700" fill="#000000" letter-spacing="1">STATUS</text>
  <rect x="97" y="515" width="12" height="12" fill="#FFFFFF" stroke="#000000" stroke-width="0.75"/>
  <text x="113" y="526" font-family="Merriweather,sans-serif" font-size="7" fill="#000000">HOLDING</text>
  <rect x="195" y="515" width="12" height="12" fill="#FFFFFF" stroke="#000000" stroke-width="0.75"/>
  <text x="211" y="526" font-family="Merriweather,sans-serif" font-size="7" fill="#000000">DRINKING</text>
  <rect x="297" y="515" width="12" height="12" fill="#FFFFFF" stroke="#000000" stroke-width="0.75"/>
  <text x="313" y="526" font-family="Merriweather,sans-serif" font-size="7" fill="#000000">SOLD</text>
  <rect x="375" y="515" width="12" height="12" fill="#FFFFFF" stroke="#000000" stroke-width="0.75"/>
  <text x="391" y="526" font-family="Merriweather,sans-serif" font-size="7" fill="#000000">GIFTED</text>

  <!-- Disposition details -->
  <text x="36" y="541" font-family="Merriweather,sans-serif" font-size="7" font-weight="700" fill="#000000" letter-spacing="1.5">DATE DISPOSED</text>
  <line x1="36" y1="556" x2="196" y2="556" stroke="#000000" stroke-width="0.75"/>
  <text x="206" y="541" font-family="Merriweather,sans-serif" font-size="7" font-weight="700" fill="#000000" letter-spacing="1.5">FINAL SALE PRICE / BOTTLE</text>
  <line x1="206" y1="556" x2="347" y2="556" stroke="#000000" stroke-width="0.75"/>
  <text x="357" y="541" font-family="Merriweather,sans-serif" font-size="7" font-weight="700" fill="#000000" letter-spacing="1.5">PROFIT / LOSS</text>
  <line x1="357" y1="556" x2="477" y2="556" stroke="#000000" stroke-width="0.75"/>

  <!-- Investment Notes -->
  <text x="36" y="571" font-family="Merriweather,sans-serif" font-size="7" font-weight="700" fill="#000000" letter-spacing="1.5">INVESTMENT NOTES</text>
  <rect x="36" y="575" width="441" height="80" fill="#FFFFFF" stroke="#000000" stroke-width="0.75"/>
  <line x1="44" y1="592" x2="469" y2="592" stroke="#E0E0E0" stroke-width="0.5"/>
  <line x1="44" y1="609" x2="469" y2="609" stroke="#E0E0E0" stroke-width="0.5"/>
  <line x1="44" y1="626" x2="469" y2="626" stroke="#E0E0E0" stroke-width="0.5"/>
  <line x1="44" y1="643" x2="469" y2="643" stroke="#E0E0E0" stroke-width="0.5"/>

  <!-- PAGE NUMBER -->
  <text x="257" y="662" font-family="Merriweather,sans-serif" font-size="9" fill="#000000" text-anchor="middle">- 1 -</text>
</svg>
